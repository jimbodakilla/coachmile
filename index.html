<script>
try {
const {
  useState,
  useEffect,
  useRef,
  useMemo,
  useCallback
} = React;

/* ============================================================
   COLOR SYSTEM
   ============================================================ */
const DARK = {
  bg: "#0D0D12",
  surface: "#13131C",
  card: "#13131C",
  cardAlt: "#0A0A0F",
  border: "#1E1E2C",
  borderSoft: "#161622",
  orange: "#FF6B35",
  orangeLight: "#FF8A5E",
  orangeGlow: "rgba(255,107,53,0.35)",
  blue: "#4A9EFF",
  green: "#3DD68C",
  purple: "#A78BFA",
  red: "#FF5C5C",
  yellow: "#FBBF24",
  teal: "#2DD4BF",
  info: "#4A9EFF",
  textPrimary: "#F0F0FA",
  textSecondary: "#8888A8",
  textMuted: "#6B6B8A",
  shadow: "none"
};
const LIGHT = {
  bg: "#F5F3EF",
  surface: "#FFFFFF",
  card: "#FFFFFF",
  cardAlt: "#EFEBE3",
  border: "#E5E1D8",
  borderSoft: "#EDE9E1",
  orange: "#E8551F",
  orangeLight: "#FF8A5E",
  orangeGlow: "rgba(232,85,31,0.22)",
  blue: "#2C7BE5",
  green: "#159F6B",
  purple: "#7C5CE0",
  red: "#DC2F2F",
  yellow: "#C98A0E",
  teal: "#0E9384",
  info: "#2C7BE5",
  textPrimary: "#1A1A24",
  textSecondary: "#4A4540",
  textMuted: "#6A6460",
  shadow: "0 2px 10px rgba(30,25,20,0.06), 0 1px 3px rgba(30,25,20,0.05)"
};

/* ============================================================
   STATIC CSS — injected once
   ============================================================ */
const STATIC_CSS = `
:root{ --dur-fast:150ms; --dur-base:250ms; --dur-slow:400ms; --ease:cubic-bezier(.22,1,.36,1); }
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',-apple-system,sans-serif;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input{font-family:inherit;}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes pop{0%{transform:scale(.85);opacity:0;}60%{transform:scale(1.04);}100%{transform:scale(1);opacity:1;}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.55;}50%{transform:scale(1.35);opacity:1;}}
@keyframes spinSlow{to{transform:rotate(360deg);}}
@keyframes confettiFall{0%{transform:translateY(-40px) rotate(0);opacity:1;}100%{transform:translateY(560px) rotate(540deg);opacity:0;}}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes barGrow{from{transform:scaleY(0);}to{transform:scaleY(1);}}
.fu1{animation:fadeUp .5s ease both;}
.fu2{animation:fadeUp .5s .06s ease both;}
.fu3{animation:fadeUp .5s .12s ease both;}
.fu4{animation:fadeUp .5s .18s ease both;}
.fu5{animation:fadeUp .5s .24s ease both;}
.fu6{animation:fadeUp .5s .30s ease both;}
.spin{animation:spinSlow 1.1s linear infinite;}
::-webkit-scrollbar{width:0;height:0;}
`;

/* ============================================================
   THEME CSS — memoized on [theme, simplified]
   ============================================================ */
function makeCSS(C, simplified) {
  const baseFont = simplified ? 17 : 15;
  const cardShadow = C.shadow;
  const HEAD = `'Space Grotesk',-apple-system,sans-serif`;
  const BODY = `'Inter',-apple-system,sans-serif`;
  const MONO = `'IBM Plex Mono',monospace`;
  return `
.app-root{background:${C.bg};color:${C.textPrimary};font-size:${baseFont}px;line-height:1.55;min-height:100vh;font-family:${BODY};}
.app-root :focus-visible{outline:2px solid ${C.orange};outline-offset:2px;border-radius:8px;}
.shell{max-width:430px;margin:0 auto;min-height:100vh;background:${C.bg};position:relative;overflow-x:hidden;}
.scroll{padding:0 20px 108px;}
.mono{font-family:${MONO};}
.syne{font-family:${HEAD};font-weight:700;letter-spacing:-.01em;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 20px 12px;position:sticky;top:0;background:${C.bg};z-index:20;}
.tb-hi{font-family:${MONO};font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:${C.textMuted};}
.tb-name{font-family:${HEAD};font-weight:700;font-size:23px;color:${C.textPrimary};margin-top:2px;letter-spacing:-.01em;}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,${C.purple},${C.orange});display:flex;align-items:center;justify-content:center;font-family:${HEAD};font-weight:700;font-size:16px;color:#fff;flex-shrink:0;}

.card{background:${C.card};border:1px solid ${C.border};border-radius:18px;padding:18px;box-shadow:${cardShadow};}
.card-tight{padding:14px;}
.eyebrow{font-family:${MONO};font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:${C.textMuted};}
.h-sec{font-family:${HEAD};font-weight:700;font-size:18px;color:${C.textPrimary};letter-spacing:-.01em;}
.muted{color:${C.textSecondary};}
.dim{color:${C.textMuted};}

.energy-row{display:flex;gap:10px;}
.energy-btn{flex:1;background:${C.cardAlt};border:1.5px solid ${C.border};border-radius:14px;padding:14px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .18s;min-height:78px;justify-content:center;}
.energy-btn .em{font-size:26px;line-height:1;}
.energy-btn .lb{font-size:11px;color:${C.textMuted};font-family:${MONO};letter-spacing:.05em;}
.energy-btn.sel{border-color:${C.orange};background:${C.orange}1A;}
.energy-btn.sel .lb{color:${C.orange};}

.coach{display:flex;gap:12px;align-items:flex-start;background:${C.card};border:1px solid ${C.border};border-radius:18px;padding:16px;box-shadow:${cardShadow};}
.coach-av{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,${C.purple},${C.blue});display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.coach-txt{font-size:14px;color:${C.textPrimary};line-height:1.55;}
.coach-txt b{color:${C.orange};}

.cycle-banner{border-radius:14px;padding:12px 14px;font-size:12.5px;display:flex;gap:9px;align-items:center;line-height:1.45;}

.mission{background:linear-gradient(160deg,${C.card},${C.cardAlt});border:1px solid ${C.border};border-radius:22px;padding:20px;position:relative;overflow:hidden;box-shadow:${cardShadow};}
.plan-badge{display:inline-flex;align-items:center;gap:5px;font-family:${MONO};font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:${C.teal};background:${C.teal}18;border:1px solid ${C.teal}44;border-radius:20px;padding:4px 10px;}
.goal-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.goal-chip{font-family:${MONO};font-size:10px;letter-spacing:.04em;color:${C.blue};background:${C.blue}14;border:1px solid ${C.blue}33;border-radius:16px;padding:4px 9px;}
.mission-title{font-family:${HEAD};font-weight:700;font-size:26px;color:${C.textPrimary};margin:12px 0 4px;line-height:1.1;letter-spacing:-.02em;}
.mission-meta{font-size:13px;color:${C.textSecondary};display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
.mission-meta b{color:${C.textPrimary};}
.interval-preview{display:flex;gap:4px;margin:6px 0 18px;height:8px;border-radius:6px;overflow:hidden;}
.ip-seg{height:100%;}
.btn-primary{width:100%;background:${C.orange};color:#fff;font-family:${HEAD};font-weight:700;font-size:16px;letter-spacing:.01em;padding:16px;border-radius:15px;box-shadow:0 6px 20px ${C.orangeGlow};transition:transform .12s;}
.btn-primary:active{transform:scale(.975);}
.btn-ghost{width:100%;background:transparent;color:${C.textMuted};font-size:13px;padding:12px;border-radius:12px;margin-top:8px;font-family:${MONO};letter-spacing:.03em;border:1px solid ${C.border};}
.btn-ghost:active{background:${C.cardAlt};}
.btn-soft{width:100%;background:${C.orange}10;color:${C.textPrimary};font-size:13.5px;font-weight:500;font-family:${BODY};padding:13px;border-radius:13px;margin-top:8px;border:1px solid ${C.orange}2E;transition:all .15s;}
.btn-soft:active{background:${C.orange}1F;}

/* goal-progress ribbon */
.goal-ribbon{background:${C.card};border:1px solid ${C.border};border-radius:14px;padding:13px 15px;box-shadow:${cardShadow};}
.goal-ribbon-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:9px;}
.goal-ribbon-wk{font-family:${HEAD};font-weight:700;font-size:14px;color:${C.textPrimary};}
.goal-ribbon-next{font-size:11.5px;color:${C.textSecondary};text-align:right;}
.goal-ribbon-track{height:5px;border-radius:3px;background:${C.border};overflow:hidden;}
.goal-ribbon-fill{height:100%;background:${C.orange};border-radius:3px;}

/* resume banner */
.resume-banner{display:flex;align-items:center;gap:12px;background:${C.orange}12;border:1px solid ${C.orange}40;border-radius:14px;padding:13px 14px;}
.resume-title{font-family:${HEAD};font-weight:700;font-size:14px;color:${C.textPrimary};}
.resume-sub{font-size:11.5px;color:${C.textSecondary};margin-top:2px;line-height:1.4;}
.resume-go{background:${C.orange};color:#fff;font-family:${HEAD};font-weight:700;font-size:13px;padding:9px 16px;border-radius:11px;flex-shrink:0;}
.resume-x{width:28px;height:28px;border-radius:50%;background:${C.card};color:${C.textMuted};font-size:14px;flex-shrink:0;}

/* data export/import rows */
.data-row{display:flex;gap:10px;margin-top:4px;}
.data-btn{flex:1;background:${C.card};border:1px solid ${C.border};border-radius:12px;padding:12px;font-size:13px;font-weight:500;color:${C.textPrimary};font-family:${BODY};display:flex;align-items:center;justify-content:center;gap:7px;}
.data-btn:active{background:${C.cardAlt};}

/* combined check-in band */
.checkin-band{background:${C.card};border:1px solid ${C.border};border-radius:18px;padding:16px;box-shadow:${cardShadow};}
.coach-inline{display:flex;gap:11px;align-items:flex-start;margin-top:14px;padding-top:14px;border-top:1px solid ${C.borderSoft};}

/* mission additions */
.mission-reassure{font-size:12.5px;color:${C.textSecondary};margin:-2px 0 12px;line-height:1.45;}
.iv-legend{display:flex;gap:15px;flex-wrap:wrap;margin:0 0 16px;}
.iv-legend .lg{display:flex;align-items:center;gap:6px;font-size:11px;color:${C.textSecondary};}
.iv-legend .sw{width:13px;height:6px;border-radius:3px;display:inline-block;}

/* friendlier empty week */
.empty-week{background:${C.card};border:1px dashed ${C.border};border-radius:14px;padding:18px 16px;text-align:center;font-size:13px;color:${C.textSecondary};line-height:1.5;box-shadow:${cardShadow};}

/* workout history */
.hist-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid ${C.borderSoft};}
.hist-item:last-child{border-bottom:none;}
.hist-ico{width:36px;height:36px;border-radius:10px;background:${C.orange}14;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hist-main{flex:1;min-width:0;}
.hist-t{font-size:14px;color:${C.textPrimary};font-weight:600;}
.hist-meta{font-size:11.5px;color:${C.textMuted};font-family:${MONO};margin-top:1px;}
.hist-mood{font-size:19px;flex-shrink:0;}
.hist-date{font-size:11px;color:${C.textMuted};font-family:${MONO};flex-shrink:0;text-align:right;min-width:52px;}

/* full-plan overview */
.pv-toggle{display:flex;gap:6px;background:${C.cardAlt};border:1px solid ${C.border};border-radius:12px;padding:4px;margin-bottom:14px;}
.pv-toggle button{flex:1;padding:8px;border-radius:9px;font-size:12.5px;font-family:${MONO};color:${C.textMuted};}
.pv-toggle button.on{background:${C.card};color:${C.orange};box-shadow:${cardShadow};}
.pv-week{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:13px;border:1px solid ${C.border};background:${C.card};margin-bottom:8px;box-shadow:${cardShadow};}
.pv-week.cur{border-color:${C.orange};background:${C.orange}0C;}
.pv-wn{font-family:${HEAD};font-weight:700;font-size:15px;width:30px;flex-shrink:0;text-align:center;}
.pv-info{flex:1;min-width:0;}
.pv-block{font-size:13px;color:${C.textPrimary};font-weight:600;display:flex;align-items:center;gap:7px;}
.pv-tag{font-family:${MONO};font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:8px;}
.pv-dots{display:flex;gap:4px;margin-top:5px;}
.pv-dot{width:8px;height:8px;border-radius:2px;}
.pv-legend{display:flex;gap:14px;flex-wrap:wrap;margin:2px 0 14px;font-size:11px;color:${C.textSecondary};}
.pv-legend span{display:flex;align-items:center;gap:5px;}
.pv-legend i{width:10px;height:10px;border-radius:3px;display:inline-block;}
.blkbar{width:4px;align-self:stretch;border-radius:3px;flex-shrink:0;}

/* day swap */
.swap-banner{background:${C.info}12;border:1px solid ${C.info}40;border-radius:12px;padding:10px 13px;font-size:12.5px;color:${C.textSecondary};margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.swap-banner b{color:${C.info};}
.cal-day.swapping{border-color:${C.info};background:${C.info}14;animation:pulseSwap 1.2s ease-in-out infinite;}
@keyframes pulseSwap{0%,100%{opacity:1;}50%{opacity:.55;}}

/* up-next */
.up-next{font-family:${MONO};font-size:11.5px;color:${C.textMuted};letter-spacing:.03em;text-align:center;margin-top:12px;}
.up-next b{color:${C.textSecondary};}

/* identity hero */
.id-hero{background:linear-gradient(150deg,${C.card},${C.cardAlt});border:1px solid ${C.border};border-radius:20px;padding:20px;box-shadow:${cardShadow};}
.id-top{display:flex;align-items:center;gap:14px;}
.id-ava{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,${C.purple},${C.orange});display:flex;align-items:center;justify-content:center;font-family:${HEAD};font-weight:700;font-size:22px;color:#fff;flex-shrink:0;}
.id-name{font-family:${HEAD};font-weight:700;font-size:22px;color:${C.textPrimary};line-height:1.1;}
.id-since{font-size:12px;color:${C.textMuted};font-family:${MONO};margin-top:3px;}
.id-stats{display:flex;gap:10px;margin-top:16px;}
.id-stat{flex:1;background:${C.card};border:1px solid ${C.border};border-radius:12px;padding:11px 8px;text-align:center;}
.id-sn{font-family:${HEAD};font-weight:700;font-size:19px;color:${C.orange};}
.id-sl{font-size:9.5px;color:${C.textMuted};font-family:${MONO};letter-spacing:.05em;text-transform:uppercase;margin-top:2px;}
.metrics-toggle{width:100%;text-align:left;background:${C.card};border:1px solid ${C.border};border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;font-size:14px;color:${C.textSecondary};font-family:${BODY};}

/* toast */
.cm-toast{position:fixed;bottom:calc(82px + env(safe-area-inset-bottom));left:50%;background:${C.textPrimary};color:${C.bg};font-size:13px;font-weight:600;padding:12px 18px;border-radius:14px;z-index:90;max-width:340px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.32);animation:toastIn .3s var(--ease);}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}
.cm-toast{transform:translateX(-50%);}

/* achievement gallery */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
.badge{background:${C.card};border:1px solid ${C.border};border-radius:14px;padding:14px 8px 12px;text-align:center;}
.badge.locked{opacity:.42;}
.badge .be{font-size:28px;line-height:1;}
.badge .bt{font-size:10.5px;color:${C.textPrimary};font-weight:600;margin-top:7px;line-height:1.25;}
.badge.locked .bt{color:${C.textMuted};}

/* weekly recap */
.recap{background:linear-gradient(150deg,${C.card},${C.cardAlt});border:1px solid ${C.border};border-radius:18px;padding:18px;box-shadow:${cardShadow};}
.recap-story{font-size:14px;color:${C.textPrimary};line-height:1.6;margin:8px 0 14px;}
.recap-nums{display:flex;gap:10px;}
.recap-num{flex:1;text-align:center;background:${C.card};border:1px solid ${C.border};border-radius:12px;padding:11px 6px;}
.recap-num .n{font-family:${HEAD};font-weight:700;font-size:20px;color:${C.orange};}
.recap-num .l{font-size:9.5px;color:${C.textMuted};font-family:${MONO};letter-spacing:.05em;text-transform:uppercase;margin-top:2px;}

/* comeback banner */
.comeback{background:${C.info}12;border:1px solid ${C.info}40;border-radius:16px;padding:16px;box-shadow:${cardShadow};}
.comeback-t{font-family:${HEAD};font-weight:700;font-size:16px;color:${C.textPrimary};margin-bottom:4px;}
.comeback-s{font-size:13px;color:${C.textSecondary};line-height:1.5;margin-bottom:14px;}

.streak-row{display:flex;gap:10px;}
.streak-pill{flex:1;background:${C.card};border:1px solid ${C.border};border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:10px;box-shadow:${cardShadow};}
.streak-ico{font-size:22px;}
.streak-n{font-family:${HEAD};font-weight:700;font-size:20px;color:${C.textPrimary};line-height:1;}
.streak-lb{font-size:10.5px;color:${C.textMuted};font-family:${MONO};letter-spacing:.04em;text-transform:uppercase;margin-top:2px;}
.shield-pill{border-color:${C.yellow}55;background:${C.yellow}12;}

.check-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid ${C.borderSoft};}
.check-item:last-child{border-bottom:none;}
.check-box{width:24px;height:24px;border-radius:8px;border:2px solid ${C.border};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:14px;}
.check-box.on{background:${C.green};border-color:${C.green};color:#fff;}
.check-lab{font-size:14px;color:${C.textPrimary};}
.check-item.done .check-lab{color:${C.textMuted};text-decoration:line-through;}

.wk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.wk-cell{background:${C.card};border:1px solid ${C.border};border-radius:14px;padding:14px 10px;text-align:center;box-shadow:${cardShadow};}
.wk-num{font-family:${HEAD};font-weight:700;font-size:22px;color:${C.orange};}
.wk-lab{font-size:10px;color:${C.textMuted};font-family:${MONO};letter-spacing:.06em;text-transform:uppercase;margin-top:3px;}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:${C.surface}F2;backdrop-filter:blur(16px);border-top:1px solid ${C.border};display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:40;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:${C.textMuted};transition:color .15s;}
.nav-item .ni{width:24px;height:24px;}
.nav-item .nl{font-size:9.5px;font-family:${MONO};letter-spacing:.03em;}
.nav-item.active{color:${C.orange};}

.ob{min-height:100vh;display:flex;flex-direction:column;padding:26px 24px calc(26px + env(safe-area-inset-bottom));max-width:430px;margin:0 auto;background:${C.bg};}
.ob-prog{height:4px;background:${C.border};border-radius:3px;overflow:hidden;margin-bottom:26px;}
.ob-prog-fill{height:100%;width:100%;background:${C.orange};border-radius:3px;transform-origin:left center;transition:transform .4s cubic-bezier(.4,0,.2,1);}
.ob-back{align-self:flex-start;font-family:${MONO};font-size:12px;color:${C.textMuted};padding:6px 0;margin-bottom:10px;}
.ob-q{font-family:${HEAD};font-weight:700;font-size:29px;line-height:1.12;color:${C.textPrimary};margin-bottom:8px;letter-spacing:-.02em;}
.ob-hint{font-size:14px;color:${C.textSecondary};margin-bottom:26px;line-height:1.5;}
.ob-opts{display:flex;flex-direction:column;gap:11px;}
.ob-opt{background:${C.card};border:1.5px solid ${C.border};border-radius:15px;padding:17px 18px;font-size:16px;color:${C.textPrimary};text-align:left;display:flex;align-items:center;gap:13px;transition:all .16s;box-shadow:${cardShadow};}
.ob-opt .oi{font-size:22px;}
.ob-opt.sel{border-color:${C.orange};background:${C.orange}14;}
.ob-opt.sel-teal{border-color:${C.teal};background:${C.teal}14;}
.ob-multi-hint{font-family:${MONO};font-size:11px;color:${C.textMuted};margin-top:14px;text-align:center;}
.ob-input{width:100%;background:${C.card};border:1.5px solid ${C.border};border-radius:15px;padding:18px;font-size:19px;color:${C.textPrimary};font-family:${HEAD};font-weight:700;text-align:center;outline:none;}
.ob-input:focus{border-color:${C.orange};}
.ob-slider-val{font-family:${HEAD};font-weight:700;font-size:52px;color:${C.orange};text-align:center;line-height:1;letter-spacing:-.02em;}
.ob-slider-unit{text-align:center;font-family:${MONO};font-size:12px;color:${C.textMuted};letter-spacing:.1em;text-transform:uppercase;margin-top:6px;margin-bottom:28px;}
.range{width:100%;-webkit-appearance:none;height:6px;border-radius:4px;background:${C.border};outline:none;}
.range::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;background:${C.orange};box-shadow:0 3px 10px ${C.orangeGlow};cursor:pointer;}
.range::-moz-range-thumb{width:30px;height:30px;border:none;border-radius:50%;background:${C.orange};cursor:pointer;}
.ob-foot{margin-top:auto;padding-top:26px;}

.parq-q{background:${C.card};border:1px solid ${C.border};border-radius:15px;padding:16px;margin-bottom:11px;box-shadow:${cardShadow};}
.parq-txt{font-size:14px;color:${C.textPrimary};margin-bottom:12px;line-height:1.45;}
.parq-btns{display:flex;gap:9px;}
.parq-btn{flex:1;padding:11px;border-radius:11px;border:1.5px solid ${C.border};font-family:${MONO};font-size:13px;color:${C.textSecondary};transition:all .15s;}
.parq-btn.yes.sel{border-color:${C.red};background:${C.red}18;color:${C.red};}
.parq-btn.no.sel{border-color:${C.green};background:${C.green}18;color:${C.green};}
.parq-warn{background:${C.yellow}12;border:1px solid ${C.yellow}44;border-radius:13px;padding:14px;font-size:12.5px;color:${C.textSecondary};line-height:1.5;margin-top:6px;}
.parq-warn b{color:${C.yellow};}

.gen-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:30px;text-align:center;max-width:430px;margin:0 auto;background:${C.bg};}
.gen-ring{width:74px;height:74px;border-radius:50%;border:4px solid ${C.border};border-top-color:${C.orange};}
.gen-txt{font-family:${HEAD};font-weight:700;font-size:22px;color:${C.textPrimary};letter-spacing:-.01em;}
.gen-step{font-family:${MONO};font-size:12px;color:${C.textMuted};letter-spacing:.05em;min-height:18px;}

.wk-full{position:fixed;inset:0;background:${C.bg};z-index:60;display:flex;flex-direction:column;max-width:430px;margin:0 auto;overflow:hidden;}
.wk-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 8px;}
.wk-phase-lab{font-family:${MONO};font-size:12px;letter-spacing:.14em;text-transform:uppercase;}
.wk-x{font-size:22px;color:${C.textMuted};width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:${C.card};}
.wk-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 26px;position:relative;}
.wk-timer{font-family:${HEAD};font-weight:700;font-size:90px;line-height:1;letter-spacing:-.03em;}
.wk-cur{font-family:${HEAD};font-weight:700;font-size:30px;margin-bottom:4px;letter-spacing:-.01em;}
.wk-rpe{font-size:13px;color:${C.textSecondary};text-align:center;margin-top:14px;line-height:1.5;max-width:290px;}
.wk-rpe b{color:${C.textPrimary};}
.breathe-dot{width:64px;height:64px;border-radius:50%;background:${C.blue};animation:breathe 5s ease-in-out infinite;margin:20px auto 4px;}
.breathe-lab{font-family:${MONO};font-size:11px;color:${C.textMuted};letter-spacing:.1em;text-align:center;}
.tread-row{display:flex;gap:12px;margin:18px 0 4px;}
.tread-cell{background:${C.card};border:1px solid ${C.border};border-radius:13px;padding:11px 18px;text-align:center;min-width:96px;}
.tread-n{font-family:${HEAD};font-weight:700;font-size:22px;color:${C.textPrimary};}
.tread-l{font-size:10px;color:${C.textMuted};font-family:${MONO};letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}
.emerg{background:${C.red}16;border:1px solid ${C.red}44;color:${C.red};border-radius:12px;padding:11px 14px;font-size:12px;text-align:center;margin:0 22px;line-height:1.4;}
.wk-strip{display:flex;gap:4px;padding:14px 22px 8px;}
.strip-seg{flex:1;height:6px;border-radius:4px;background:${C.border};overflow:hidden;}
.strip-fill{height:100%;border-radius:4px;}
.wk-ctrls{display:flex;gap:12px;padding:8px 22px calc(24px + env(safe-area-inset-bottom));}
.ctrl-pause{flex:1;background:${C.card};border:1.5px solid ${C.border};color:${C.textPrimary};font-family:${HEAD};font-weight:700;font-size:17px;padding:21px 16px;border-radius:16px;min-height:64px;}
.ctrl-finish{flex:1.6;background:${C.orange};color:#fff;font-family:${HEAD};font-weight:700;font-size:17px;padding:21px 16px;border-radius:16px;min-height:64px;box-shadow:0 6px 18px ${C.orangeGlow};}
.slider-val-btn{background:none;border:none;width:100%;cursor:text;padding:0;}
.tap-hint{color:${C.textMuted};opacity:.8;}

.stretch-full{position:fixed;inset:0;background:${C.bg};z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;max-width:430px;margin:0 auto;padding:30px;text-align:center;gap:8px;}
.stretch-em{font-size:60px;}
.stretch-name{font-family:${HEAD};font-weight:700;font-size:30px;color:${C.textPrimary};letter-spacing:-.01em;}
.stretch-desc{font-size:14px;color:${C.textSecondary};max-width:300px;line-height:1.5;}
.stretch-time{font-family:${HEAD};font-weight:700;font-size:64px;color:${C.green};margin:12px 0;letter-spacing:-.02em;}
.dots{display:flex;gap:8px;margin:8px 0 22px;}
.dot{width:9px;height:9px;border-radius:50%;background:${C.border};}
.dot.on{background:${C.green};}
.dot.cur{background:${C.orange};transform:scale(1.3);}

.done-full{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 26px calc(30px + env(safe-area-inset-bottom));max-width:430px;margin:0 auto;text-align:center;gap:6px;background:${C.bg};}
.done-ring{width:96px;height:96px;border-radius:50%;background:${C.green}1A;border:3px solid ${C.green};display:flex;align-items:center;justify-content:center;font-size:46px;margin-bottom:8px;}
.done-title{font-family:${HEAD};font-weight:700;font-size:32px;color:${C.textPrimary};letter-spacing:-.02em;}
.done-stats{display:flex;gap:12px;margin:22px 0;width:100%;}
.done-stat{flex:1;background:${C.card};border:1px solid ${C.border};border-radius:14px;padding:16px 8px;box-shadow:${cardShadow};}
.done-stat .n{font-family:${HEAD};font-weight:700;font-size:24px;color:${C.orange};}
.done-stat .l{font-size:10px;color:${C.textMuted};font-family:${MONO};letter-spacing:.05em;text-transform:uppercase;margin-top:3px;}

.sheet-scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:70;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease;}

/* ============================================================
   PLAN ENGINE  (variant + goals + session length)
   ============================================================ */
const PLAN_VARIANTS = {
  A: {
    key: "A",
    name: "Zero-to-Running",
    tag: "walk / run",
    desc: "Gentle start. Mostly walking with short run bursts."
  },
  B: {
    key: "B",
    name: "C25K Standard",
    tag: "Couch to 5K",
    desc: "The classic balanced build toward continuous running."
  },
  C: {
    key: "C",
    name: "Build Endurance",
    tag: "Run-focused",
    desc: "Longer running blocks to grow your aerobic base."
  }
};
function abilityToPlan(a) {
  if (a === "Can't run yet") return "A";
  if (a === "I run a little") return "B";
  return "C";
}
function ivColor(C, type) {
  return {
    warmup: C.blue,
    walk: C.blue,
    run: C.orange,
    cool: C.green,
    rest: C.textMuted
  }[type] || C.textMuted;
}
function totalMinutes(ivs) {
  return ivs.reduce((s, i) => s + i.duration, 0);
}

// per-variant building blocks
const CYCLES = {
  A: {
    warmup: {
      type: "warmup",
      name: "Warm-up walk",
      duration: 5,
      speed: 3.0,
      incline: 0
    },
    cool: {
      type: "cool",
      name: "Cool-down walk",
      duration: 5,
      speed: 2.8,
      incline: 0
    },
    cycle: [{
      type: "run",
      name: "Easy jog",
      duration: 1,
      speed: 4.5,
      incline: 1.0
    }, {
      type: "walk",
      name: "Recovery walk",
      duration: 4,
      speed: 3.0,
      incline: 0
    }]
  },
  B: {
    warmup: {
      type: "warmup",
      name: "Warm-up walk",
      duration: 5,
      speed: 3.2,
      incline: 0
    },
    cool: {
      type: "cool",
      name: "Cool-down walk",
      duration: 5,
      speed: 3.0,
      incline: 0
    },
    cycle: [{
      type: "run",
      name: "Run",
      duration: 3,
      speed: 5.2,
      incline: 1.0
    }, {
      type: "walk",
      name: "Walk",
      duration: 2,
      speed: 3.2,
      incline: 0
    }]
  },
  C: {
    warmup: {
      type: "warmup",
      name: "Warm-up walk",
      duration: 5,
      speed: 3.5,
      incline: 0
    },
    cool: {
      type: "cool",
      name: "Cool-down walk",
      duration: 5,
      speed: 3.2,
      incline: 0
    },
    cycle: [{
      type: "run",
      name: "Steady run",
      duration: 8,
      speed: 5.8,
      incline: 1.0
    }, {
      type: "walk",
      name: "Recovery",
      duration: 2,
      speed: 3.4,
      incline: 0
    }]
  }
};
// goals is an array of strings
function applyGoals(tpl, goals) {
  const t = {
    warmup: {
      ...tpl.warmup
    },
    cool: {
      ...tpl.cool
    },
    cycle: tpl.cycle.map(s => ({
      ...s
    })),
    stress: false,
    mods: []
  };
  goals.forEach(g => {
    if (g === "Lose weight") {
      t.cycle.forEach(s => {
        s.incline = +Math.min(4, s.incline + 0.5).toFixed(1);
      });
      t.warmup.incline = 0.5;
      t.mods.push("+incline for fat burn");
    }
    if (g === "Build endurance") {
      t.cycle.forEach(s => {
        if (s.type === "run") s.duration = Math.max(1, Math.round(s.duration * 1.4));
      });
      t.mods.push("longer run blocks");
    }
    if (g === "Reduce stress") {
      t.cycle.forEach(s => {
        if (s.type === "run") s.speed = +Math.max(3, s.speed - 0.3).toFixed(1);
      });
      t.stress = true;
      t.mods.push("calmer pace + breathing");
    }
    // "Feel healthier" keeps the balanced default
  });
  return t;
}
function capFromDuration(rd) {
  return {
    "Under 5 min": 2,
    "5–10 min": 5,
    "10–20 min": 8,
    "20–30 min": 12,
    "30+ min": 15
  }[rd] || 0;
}
/* #21 periodization — named 4-week blocks, deloads every 4th week, week-12 graduation */
const PATTERNS = {
  2: ["run", "rest", "rest", "run", "rest", "rest", "rest"],
  3: ["run", "rest", "run", "rest", "rest", "run", "rest"],
  4: ["run", "rest", "run", "walk", "rest", "run", "rest"],
  5: ["run", "walk", "run", "rest", "run", "walk", "rest"],
  6: ["run", "walk", "run", "walk", "run", "run", "rest"]
};
function blockOf(week) {
  return week <= 4 ? {
    name: "Foundation",
    key: "foundation"
  } : week <= 8 ? {
    name: "Build",
    key: "build"
  } : {
    name: "Peak",
    key: "peak"
  };
}
function isDeload(week) {
  return week % 4 === 0 && week < 12;
} // weeks 4 & 8 are recovery
function isGraduation(week) {
  return week >= 12;
} // week 12 is taper + graduation
function shapeTitle(shape, deload, grad) {
  if (grad && (shape === "long" || shape === "quality")) return "Graduation 5K";
  if (deload) return "Recovery Run";
  return shape === "long" ? "Long Run" : shape === "easy" ? "Easy Run" : "Interval Run";
}
function buildRunDay(variant, goals, timeTarget, runDuration, week, shape, deload) {
  const wk = Math.max(1, week || 1);
  const runMult = 1 + (wk - 1) * 0.10;
  const walkMult = Math.max(0.5, 1 - (wk - 1) * 0.05);
  // #11/#14 session shape — quality (intervals), easy, or long
  let timeMult = 1,
    runShapeMult = 1,
    easySpeed = 0;
  if (shape === "easy") {
    timeMult = 0.8;
    easySpeed = -0.3;
  } else if (shape === "long") {
    timeMult = 1.4;
  } else {
    runShapeMult = 1.1;
  } // quality
  if (deload || isGraduation(wk)) timeMult *= 0.7; // deload weeks & week-12 taper
  const cap = capFromDuration(runDuration);
  const baseRun = cap != 0 ? Math.max(1, Math.min(cap, Math.round(cap * 0.6))) : null;
  const src = CYCLES[variant];
  const base = {
    warmup: {
      ...src.warmup
    },
    cool: {
      ...src.cool
    },
    cycle: src.cycle.map(s => {
      const c = {
        ...s
      };
      if (c.type === "run") {
        const start = baseRun != null ? baseRun : c.duration;
        c.duration = Math.max(1, Math.round(start * runMult * runShapeMult));
        if (easySpeed) c.speed = +Math.max(3, c.speed + easySpeed).toFixed(1);
      }
      if (c.type === "walk") {
        c.duration = Math.max(1, Math.round(c.duration * walkMult));
      }
      return c;
    })
  };
  const tpl = applyGoals(base, goals);
  const cycleLen = tpl.cycle.reduce((s, x) => s + x.duration, 0);
  const fixed = tpl.warmup.duration + tpl.cool.duration + (tpl.stress ? 2 : 0);
  const durCap = Math.min(60, ({
    A: 30,
    B: 35,
    C: 60
  }[variant] || 45) + (wk - 1) * 2);
  const effTime = Math.min(timeTarget || 30, durCap) * timeMult;
  const workMin = Math.max(cycleLen, effTime - fixed);
  const nCycles = Math.max(1, Math.round(workMin / cycleLen));
  const ivs = [{
    ...tpl.warmup
  }];
  for (let i = 0; i < nCycles; i++) {
    tpl.cycle.forEach(s => ivs.push({
      ...s
    }));
  }
  if (tpl.stress) ivs.push({
    type: "cool",
    name: "Mindful breathing",
    duration: 2,
    speed: 2.5,
    incline: 0,
    breath: true
  });
  ivs.push({
    ...tpl.cool
  });
  return {
    ivs,
    mods: tpl.mods
  };
}

/* #2 advanced workouts for graduates / stronger runners — real runner sessions, not just walk/run */
function advEasy(variant) { return variant === "C" ? 5.8 : variant === "B" ? 5.2 : 4.6; }
function progWarmup(easy) {
  return [{ type: "warmup", name: "Warm-up walk", duration: 3, speed: 3.2, incline: 0 },
          { type: "warmup", name: "Easy jog to warm up", duration: 3, speed: +(easy - 0.6).toFixed(1), incline: 1 }];
}
function strideSet(easy) {
  const out = [];
  for (let i = 0; i < 4; i++) {
    out.push({ type: "run", name: "Stride (relaxed & fast)", duration: 0.5, speed: +(easy + 1.8).toFixed(1), incline: 0 });
    out.push({ type: "walk", name: "Easy", duration: 0.5, speed: 3.2, incline: 0 });
  }
  return out;
}
const ADV_COOL = { type: "cool", name: "Cool-down jog to walk", duration: 5, speed: 3.4, incline: 0 };
function buildTempo(variant, timeTarget) {
  const easy = advEasy(variant), tempo = +(easy + 0.8).toFixed(1);
  const t = Math.max(8, Math.min(24, (timeTarget || 40) - 14));
  return { ivs: [...progWarmup(easy), { type: "run", name: "Tempo — comfortably hard", duration: t, speed: tempo, incline: 1 }, ADV_COOL],
           title: "Tempo Run", focus: t + " min comfortably hard" };
}
function buildIntervals(variant, timeTarget) {
  const easy = advEasy(variant), hard = +(easy + 1.4).toFixed(1);
  const reps = Math.max(4, Math.min(8, Math.round(((timeTarget || 40) - 16) / 4)));
  const ivs = [...progWarmup(easy), ...strideSet(easy)];
  for (let i = 0; i < reps; i++) { ivs.push({ type: "run", name: "Interval — hard", duration: 2, speed: hard, incline: 0.5 }); ivs.push({ type: "walk", name: "Recovery", duration: 2, speed: 3.3, incline: 0 }); }
  ivs.push(ADV_COOL);
  return { ivs, title: "Interval Session", focus: reps + " × 2 min hard" };
}
function buildHills(variant, timeTarget) {
  const easy = advEasy(variant), hillSpeed = +(easy - 0.4).toFixed(1);
  const reps = Math.max(5, Math.min(10, Math.round(((timeTarget || 40) - 14) / 3)));
  const ivs = [...progWarmup(easy)];
  for (let i = 0; i < reps; i++) { ivs.push({ type: "run", name: "Hill push", duration: 1, speed: hillSpeed, incline: 6 }); ivs.push({ type: "walk", name: "Walk down", duration: 1.5, speed: 3.2, incline: 0 }); }
  ivs.push(ADV_COOL);
  return { ivs, title: "Hill Repeats", focus: reps + " × 1 min at 6% incline" };
}
function buildFartlek(variant, timeTarget) {
  const easy = advEasy(variant);
  const ivs = [...progWarmup(easy)];
  const surges = [[1, easy + 1.2], [2, easy + 0.6], [0.5, easy + 1.8], [3, easy + 0.4], [1, easy + 1.2]];
  const cycles = Math.max(1, Math.round(((timeTarget || 40) - 14) / 7.5));
  for (let c = 0; c < cycles; c++) surges.forEach((sr, k) => ivs.push({ type: "run", name: k % 2 ? "Float easy" : "Surge", duration: sr[0], speed: +sr[1].toFixed(1), incline: 0.5 }));
  ivs.push(ADV_COOL);
  return { ivs, title: "Fartlek", focus: "Play with pace — surge and float" };
}
const ADV_ROTATION = ["tempo", "intervals", "hills", "fartlek"];
function buildAdvanced(kind, variant, timeTarget) {
  return kind === "tempo" ? buildTempo(variant, timeTarget) : kind === "intervals" ? buildIntervals(variant, timeTarget) : kind === "hills" ? buildHills(variant, timeTarget) : buildFartlek(variant, timeTarget);
}

// Treadmill walk session (replaces strength days — this app is treadmill-only)
function buildWalkDay(goals, timeTarget) {
  const loseW = goals.includes("Lose weight");
  const stress = goals.includes("Reduce stress");
  let title, focus, block;
  if (loseW) {
    title = "Incline Walk";
    focus = "Fat-burn incline walk";
    block = {
      type: "walk",
      name: "Incline power walk",
      duration: 5,
      speed: 3.6,
      incline: 6
    };
  } else if (stress) {
    title = "Mindful Walk";
    focus = "Easy stress-reset walk";
    block = {
      type: "walk",
      name: "Easy steady walk",
      duration: 5,
      speed: 3.2,
      incline: 1
    };
  } else {
    title = "Recovery Walk";
    focus = "Easy active-recovery walk";
    block = {
      type: "walk",
      name: "Steady walk",
      duration: 5,
      speed: 3.4,
      incline: 2
    };
  }
  const warm = {
    type: "warmup",
    name: "Warm-up walk",
    duration: 5,
    speed: 3.0,
    incline: 0
  };
  const cool = {
    type: "cool",
    name: "Cool-down walk",
    duration: 5,
    speed: 2.8,
    incline: 0
  };
  const workMin = Math.max(5, (timeTarget || 30) - 10);
  // steady walk = one continuous block, not N identical repeats (no intervals to cue)
  const ivs = [warm, {
    ...block,
    duration: workMin
  }, cool];
  return {
    ivs,
    title,
    focus
  };
}
/* #split — blend running with bodyweight strength based on training focus */
function applyMix(pat, mix) {
  if (mix !== "mixed" && mix !== "strength") return pat;
  const out = pat.slice();
  const runIdxs = out.map((s, i) => s === "run" ? i : -1).filter(i => i >= 0);
  if (runIdxs.length === 0) return out;

  // dynamic patterns (name/number captured)
  var RULES = [
    {re:/^Step (\d+) of (\d+)$/, es:function(m){return "Paso "+m[1]+" de "+m[2];}},
    {re:/^Week (\d+) of (\d+)$/, es:function(m){return "Semana "+m[1]+" de "+m[2];}},
    {re:/^Week (\d+) · (.+) block · Plan (.+)$/, es:function(m){return "Semana "+m[1]+" · bloque "+m[2]+" · Plan "+m[3];}},
    {re:/^Round (\d+) done · take a breath$/i, es:function(m){return "Ronda "+m[1]+" hecha · respira";}},
    {re:/^Good to see you, (.+?)\. Remember, (.+?)\. Let's roll\.$/, es:function(m){var why=ES[m[2]]||m[2];return "Hola de nuevo, "+m[1]+". Recuerda, "+why+". ¡Vamos!";}},
    {re:/^You're charged up, (.+?), and (.+?)\. Let's make it count\.$/, es:function(m){var why=ES[m[2]]||m[2];return "Estás con toda la energía, "+m[1]+", y "+why+". Que valga la pena.";}}
  ];
  var whyMap = {
    "every honest session moves you toward your goal weight":"cada sesión te acerca a tu peso meta",
    "today builds your endurance up a little more":"hoy tu resistencia sube un poco más",
    "this is your time to move and clear your head":"este es tu momento para moverte y despejar la mente",
    "today's another chance to stack one honest session":"hoy es otra oportunidad de sumar una sesión honesta"
  };
  for(var k in whyMap) ES[k]=whyMap[k];

  var lang = (function(){try{return localStorage.getItem('coachmile_lang')||'en';}catch(e){return 'en';}})();
  function tNode(t){
    var s=t.nodeValue; if(!s) return; var key=s.trim(); if(!key) return;
    if(ES.hasOwnProperty(key)){ var out=s.replace(key,ES[key]); if(t.nodeValue!==out) t.nodeValue=out; return; }
    for(var i=0;i<RULES.length;i++){ var mm=key.match(RULES[i].re); if(mm){ var o=RULES[i].es(mm); if(o){ var r=s.replace(key,o); if(t.nodeValue!==r) t.nodeValue=r; } return; } }
  }
  function tAll(root){
    if(lang!=='es'||!root) return;
    var wk=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null), n, arr=[]; while(n=wk.nextNode())arr.push(n); arr.forEach(tNode);
    var ph=root.querySelectorAll('[placeholder]'); for(var i=0;i<ph.length;i++){var kk=(ph[i].getAttribute('placeholder')||'').trim(); if(ES[kk])ph[i].setAttribute('placeholder',ES[kk]);}
  }
  var sched=false;
  function schedule(){ if(sched)return; sched=true; (window.requestAnimationFrame||window.setTimeout)(function(){sched=false; tAll(document.getElementById('root'));},16); }
  var obs=null;
  function start(){ var root=document.getElementById('root'); if(!root)return; if(!obs){obs=new MutationObserver(schedule);} obs.observe(root,{childList:true,subtree:true,characterData:true}); schedule(); }
  window.__cmLang=function(){return lang;};
  window.__cmSetLang=function(l){ try{localStorage.setItem('coachmile_lang',l);}catch(e){} if(l==='es'){lang='es'; start();} else { lang='en'; try{location.reload();}catch(e){} } };
  if(lang==='es'){ if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',function(){setTimeout(start,60);});} else {setTimeout(start,60);} }
})();
